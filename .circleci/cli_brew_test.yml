version: 2.1

parameters:
  run_cli_tests:
    default: false
    type: boolean

workflows:
  cli-install-test:
    when: << pipeline.parameters.run_cli_tests >>
    jobs:
      - install_and_verify_macos
      - install_and_verify_linux

jobs:
  install_and_verify_macos:
    macos:
      xcode: 16.2.0
    resource_class: m4pro.medium
    steps:
      - checkout
      - run:
          name: Uninstall existing CircleCI CLI
          command: |
            brew uninstall circleci || true
            brew uninstall --cask circleci --force || true
            brew unlink circleci || true
            rm -f /opt/homebrew/bin/circleci
      - run:
          name: Install circleci@next cask
          command: |
            brew install --cask Casks/circleci@next.rb
      - run:
          name: Verify man page prints
          # this doesn't attempt to verify the output of the man page
          command: |
            [[ "$(man circleci | wc -l)" -gt "20" ]];
      - run:
          name: Verify CLI is runnable
          # this doesn't attempt to verify the output of the man page
          # that should be done via a golden file in the CLI repo
          command: |
            circleci --help

  install_and_verify_linux:
    docker:
      - image: homebrew/brew:latest
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Install deps
          command: |
            sudo apt-get update
            sudo apt-get install -y man
      - run:
          name: Install circleci@next cask
          command: |
            brew install --cask Casks/circleci@next.rb
      - run:
          name: Verify man page prints
          # this doesn't attempt to verify the output of the man page
          # that should be done via a golden file in the CLI repo
          command: |
            [[ "$(man circleci | wc -l)" -gt "20" ]];
      - run:
          name: Verify CLI is runnable
          # this doesn't attempt to verify the output of the man page
          # that should be done via a golden file in the CLI repo
          command: |
            circleci --help
