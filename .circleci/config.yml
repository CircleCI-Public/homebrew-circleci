version: 2.1

setup: true

orbs:
  path-filtering: circleci/path-filtering@3.0.0
  continuation: circleci/continuation@2.0.1

parameters:
  trigger_smoketest:
    default: false
    type: boolean

workflows:
  setup:
    when:
      not: << pipeline.parameters.trigger_smoketest >>
    jobs:
      - path-filtering/filter:
          base-revision: main
          config-path: .circleci/runner_brew_test.yml
          mapping: |
            Casks/circleci-runner\.rb run_tests true
      - path-filtering/filter:
          name: filter-cli-tests
          base-revision: main
          config-path: .circleci/cli_brew_test.yml
          mapping: |
            Casks/circleci@next\.rb run_cli_tests true

  smoketest-continue:
    when: << pipeline.parameters.trigger_smoketest >>
    jobs:
      - continue-smoketest

jobs:
  continue-smoketest:
    executor: continuation/default
    steps:
      - checkout
      - continuation/continue:
          configuration_path: .circleci/runner_brew_test.yml
          parameters: '{"run_smoketest": true}'
