version: 2.1
setup: true

orbs:
  path-filtering: circleci/path-filtering@1.2.0
  continuation: circleci/continuation@1.0.0

parameters:
  run_smoketest:
    default: false
    type: boolean

workflows:
  # Triggered via API with run_smoketest: true — bypass path filtering
  smoketest-trigger:
    when: << pipeline.parameters.run_smoketest >>
    jobs:
      - continuation/continue:
          configuration_path: .circleci/runner_package_config.yml
          parameters: '{"run_smoketest": true, "run_runner_tests": false}'

  # Regular commit — only run runner tests if circleci-runner.rb changed
  setup:
    when:
      not: << pipeline.parameters.run_smoketest >>
    jobs:
      - path-filtering/filter:
          base-revision: main
          config-path: .circleci/runner_package_config.yml
          mapping: |
            Casks/circleci-runner\.rb run_runner_tests true
